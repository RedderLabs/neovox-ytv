<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEOVOX YT-V · Tocadiscos Futurista</title>

  <!-- Tailwind CSS v4 -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- Fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />

  <!-- Tailwind theme -->
  <style type="text/tailwindcss">
    @theme {
      --font-orbitron: 'Orbitron', monospace;
      --font-mono-tech: 'Share Tech Mono', monospace;
    }
    body { font-family: var(--font-orbitron); }
  </style>

  <!-- Estilos custom -->
  <link rel="stylesheet" href="style.css" />
</head>

<body class="min-h-screen flex flex-col items-center">

  <!-- YouTube IFrame oculto -->
  <div id="yt-hidden" style="position:absolute;opacity:0;pointer-events:none;width:1px;height:1px;top:0;left:0;">
    <div id="yt-player"></div>
  </div>

  <!-- Header fijo -->
  <header class="app-header fixed top-0 left-0 right-0 z-50 flex items-center justify-between px-4 sm:px-6 h-12 sm:h-14">
    <div class="flex items-center gap-2">
      <div class="header-dot"></div>
      <span class="text-[10px] sm:text-[12px] tracking-[5px] font-bold" style="color:var(--text-header);font-family:'Orbitron',monospace">NEOVOX</span>
      <span class="text-[8px] sm:text-[9px] tracking-[3px]" style="color:var(--text-sub);font-family:'Share Tech Mono',monospace">YT-V</span>
    </div>
    <button class="theme-btn" id="themeBtn" title="Cambiar tema">
      <svg class="icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="var(--btn-fill)"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="icon-sun" width="14" height="14" viewBox="0 0 24 24" fill="var(--btn-fill)"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="var(--btn-fill)" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
  </header>

  <!-- Spacer para el header fijo -->
  <div class="h-14 sm:h-16 shrink-0"></div>

  <!-- Layout principal: columna en móvil, fila en desktop -->
  <div class="flex flex-col lg:flex-row gap-3 sm:gap-4 w-full max-w-5xl items-stretch p-2 sm:p-4">

    <!-- ===== PLAYER ===== -->
    <div class="player-panel relative rounded-2xl p-4 sm:p-6 w-full lg:w-[480px] xl:w-[520px] shrink-0">

      <!-- Scanlines overlay -->
      <div class="scanlines absolute inset-0 rounded-2xl pointer-events-none z-10"></div>

      <!-- Corner accents -->
      <div class="absolute top-3 left-3 w-4 h-4 border-t-2 border-l-2" style="border-color:var(--border-corner)"></div>
      <div class="absolute top-3 right-3 w-4 h-4 border-t-2 border-r-2" style="border-color:var(--border-corner)"></div>
      <div class="absolute bottom-3 left-3 w-4 h-4 border-b-2 border-l-2" style="border-color:var(--border-corner)"></div>
      <div class="absolute bottom-3 right-3 w-4 h-4 border-b-2 border-r-2" style="border-color:var(--border-corner)"></div>

      <!-- Status dots -->
      <div class="flex justify-end items-center mb-2 gap-1.5">
        <div class="w-1.5 h-1.5 rounded-full" id="d1" style="background:var(--dot-off)"></div>
        <div class="w-1.5 h-1.5 rounded-full" id="d2" style="background:var(--dot-off)"></div>
        <div class="w-1.5 h-1.5 rounded-full animate-blink" id="d3" style="background:var(--dot-on);box-shadow:0 0 7px var(--dot-on)"></div>
      </div>

      <!-- Turntable (responsive via CSS) -->
      <div class="turntable-area relative flex justify-center items-center mb-4">
        <!-- Plato base -->
        <div class="platter-wrap absolute rounded-full" style="border:1px solid var(--border-panel)"></div>

        <!-- Vinilo -->
        <div class="vinyl-wrap vinyl-bg absolute rounded-full will-change-transform" id="vinyl">
          <!-- Surcos (porcentuales) -->
          <div class="absolute rounded-full groove-ring" style="width:95%;height:95%;top:2.5%;left:2.5%"></div>
          <div class="absolute rounded-full groove-ring" style="width:86%;height:86%;top:7%;left:7%"></div>
          <div class="absolute rounded-full groove-ring" style="width:77%;height:77%;top:11.5%;left:11.5%"></div>
          <div class="absolute rounded-full groove-ring" style="width:68%;height:68%;top:16%;left:16%"></div>
          <div class="absolute rounded-full groove-ring" style="width:59%;height:59%;top:20.5%;left:20.5%"></div>
          <div class="absolute rounded-full groove-ring" style="width:50%;height:50%;top:25%;left:25%"></div>
          <!-- Etiqueta central / carátula -->
          <div id="vinylLabel" class="vinyl-label absolute rounded-full flex flex-col items-center justify-center z-10 label-center overflow-hidden">
            <div id="labelCover" class="label-cover"></div>
            <span id="labelText1" class="label-text font-bold tracking-[1.5px]" style="font-size:clamp(4px,1.2vw,6px);color:var(--text-label)">CYBER</span>
            <span id="labelText2" class="label-text mt-0.5" style="font-family:'Share Tech Mono',monospace;font-size:clamp(4px,1.1vw,7px);color:var(--text-label-sub)">33&#8531;</span>
          </div>
          <!-- Eje central -->
          <div class="vinyl-axle absolute rounded-full z-20 axle-center"></div>
        </div>

        <!-- Brazo tocadiscos -->
        <div class="tonearm-container" id="tonearm">
          <div class="tonearm-pivot absolute w-5 h-5 rounded-full z-10" style="top:10px;right:10px;"></div>
          <div class="tonearm-arm">
            <div class="tonearm-head">
              <div class="tonearm-needle"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Waveform -->
      <div class="flex items-center justify-center gap-0.5 h-6 sm:h-7 mb-3 px-2" id="wf"></div>

      <!-- Track info -->
      <div class="text-center mb-3 min-h-[34px] sm:min-h-[38px]">
        <div class="text-[9px] sm:text-[11px] tracking-[2px] font-bold mb-1 truncate max-w-full mx-auto" id="tiName" style="color:var(--text-title)">· NEOVOX YT-V ·</div>
        <div class="text-[8px] sm:text-[9px] tracking-[2px]" style="font-family:'Share Tech Mono',monospace;color:var(--text-sub)" id="tiSub">SELECCIONA UNA PLAYLIST</div>
      </div>

      <!-- Progreso -->
      <div class="mb-3 px-1">
        <div class="h-1 sm:h-0.5 rounded-full relative cursor-pointer mb-1.5" id="progBg" style="background:var(--prog-bg)">
          <div class="prog-fill h-full rounded-full relative" id="progFill" style="width:0%"></div>
        </div>
        <div class="flex justify-between prog-time">
          <span id="tCur">0:00</span>
          <span id="tTot">0:00</span>
        </div>
      </div>

      <!-- Controles -->
      <div class="flex justify-center items-center gap-2 sm:gap-3 mb-3">
        <button class="ctrl-btn w-9 h-9 sm:w-8 sm:h-8" id="prevBtn">
          <svg width="12" height="12" viewBox="0 0 12 12"><polygon points="10,1 3,6 10,11"/><rect x="1" y="1" width="2" height="10" rx="1"/></svg>
        </button>
        <button class="ctrl-btn w-11 h-11 sm:w-10 sm:h-10" id="stopBtn">
          <svg width="14" height="14" viewBox="0 0 14 14"><rect x="2" y="2" width="10" height="10" rx="1"/></svg>
        </button>
        <button class="ctrl-btn w-16 h-16 sm:w-14 sm:h-14" id="playBtn" style="border-color:var(--btn-active-border)">
          <svg width="20" height="20" viewBox="0 0 18 18" id="playIco"><polygon points="6,3 15,9 6,15"/></svg>
        </button>
        <button class="ctrl-btn w-11 h-11 sm:w-10 sm:h-10" id="pauseBtn">
          <svg width="14" height="14" viewBox="0 0 14 14"><rect x="2" y="2" width="4" height="10" rx="1"/><rect x="8" y="2" width="4" height="10" rx="1"/></svg>
        </button>
        <button class="ctrl-btn w-9 h-9 sm:w-8 sm:h-8" id="nextBtn">
          <svg width="12" height="12" viewBox="0 0 12 12"><polygon points="2,1 9,6 2,11"/><rect x="9" y="1" width="2" height="10" rx="1"/></svg>
        </button>
      </div>

      <!-- Ecualizador -->
      <div class="eq-panel rounded-lg p-3 mb-3 mx-1" style="background:var(--input-bg);border:1px solid var(--input-border)">
        <div class="flex items-center justify-between mb-2">
          <span class="text-[7px] tracking-[2px]" style="color:var(--text-vol)">EQUALIZER</span>
          <div class="flex gap-1">
            <button class="eq-preset-btn active" data-preset="flat">FLAT</button>
            <button class="eq-preset-btn" data-preset="bass">BASS</button>
            <button class="eq-preset-btn" data-preset="vocal">VOCAL</button>
            <button class="eq-preset-btn" data-preset="treble">TREBLE</button>
          </div>
        </div>
        <div class="flex items-end justify-between gap-1 h-[60px]" id="eqSliders">
          <div class="eq-band" data-band="60"><input type="range" class="eq-slider" min="-12" max="12" value="0" orient="vertical"><span class="eq-label">60</span></div>
          <div class="eq-band" data-band="150"><input type="range" class="eq-slider" min="-12" max="12" value="0" orient="vertical"><span class="eq-label">150</span></div>
          <div class="eq-band" data-band="400"><input type="range" class="eq-slider" min="-12" max="12" value="0" orient="vertical"><span class="eq-label">400</span></div>
          <div class="eq-band" data-band="1k"><input type="range" class="eq-slider" min="-12" max="12" value="0" orient="vertical"><span class="eq-label">1K</span></div>
          <div class="eq-band" data-band="2.5k"><input type="range" class="eq-slider" min="-12" max="12" value="0" orient="vertical"><span class="eq-label">2.5K</span></div>
          <div class="eq-band" data-band="6k"><input type="range" class="eq-slider" min="-12" max="12" value="0" orient="vertical"><span class="eq-label">6K</span></div>
          <div class="eq-band" data-band="12k"><input type="range" class="eq-slider" min="-12" max="12" value="0" orient="vertical"><span class="eq-label">12K</span></div>
          <div class="eq-band" data-band="16k"><input type="range" class="eq-slider" min="-12" max="12" value="0" orient="vertical"><span class="eq-label">16K</span></div>
        </div>
      </div>

      <!-- Volumen + Velocidad -->
      <div class="flex flex-col gap-2 px-1 mb-2">
        <!-- Volumen -->
        <div class="flex items-center gap-2">
          <span class="text-[7px] tracking-[2px] min-w-[24px]" style="color:var(--text-vol)">VOL</span>
          <input type="range" class="vol-slider flex-1" id="volSl" min="0" max="100" value="80"
                 style="background:linear-gradient(to right, var(--vol-fill) 80%, var(--vol-track) 80%)" />
          <span class="text-[8px] min-w-[24px] text-right" style="font-family:'Share Tech Mono',monospace;color:var(--text-vol-val)" id="volVal">80</span>
        </div>
        <!-- Velocidad -->
        <div class="flex items-center gap-2">
          <span class="text-[7px] tracking-[2px] min-w-[24px]" style="color:var(--text-vol)">SPD</span>
          <div class="speed-btns flex-1 flex items-center justify-between gap-1" id="speedBtns">
            <button class="speed-btn" data-speed="0.5">0.5x</button>
            <button class="speed-btn" data-speed="0.75">0.75x</button>
            <button class="speed-btn active" data-speed="1">1x</button>
            <button class="speed-btn" data-speed="1.25">1.25x</button>
            <button class="speed-btn" data-speed="1.5">1.5x</button>
            <button class="speed-btn" data-speed="2">2x</button>
          </div>
        </div>
      </div>

      <!-- Mensaje sistema -->
      <div class="text-center text-[7px] sm:text-[8px] tracking-[1px] min-h-[12px]"
           style="font-family:'Share Tech Mono',monospace;color:var(--text-sys)" id="sysmsg">SELECCIONA UNA PLAYLIST DEL PANEL</div>
    </div>

    <!-- ===== PANEL PLAYLISTS ===== -->
    <div class="playlist-panel flex-1 rounded-2xl p-4 sm:p-5 w-full min-w-0">

      <!-- Header panel -->
      <div class="flex justify-between items-center mb-3 sm:mb-4">
        <span class="text-[9px] sm:text-[10px] tracking-[3px] font-bold" style="color:var(--text-header)">PLAYLIST VAULT</span>
        <span class="text-[8px] tracking-[1px]" style="font-family:'Share Tech Mono',monospace;color:var(--counter-color)" id="counter">0 LISTAS</span>
      </div>

      <!-- Formulario añadir -->
      <div class="rounded-xl p-3 sm:p-4 mb-4" style="background:var(--form-bg);border:1px solid var(--form-border)">
        <div class="mb-3">
          <label class="block text-[7px] tracking-[2px] mb-1.5" style="color:var(--label-color)">NOMBRE</label>
          <input class="cyber-input" id="plName" placeholder="Mi playlist favorita" maxlength="40" />
        </div>
        <div class="mb-3">
          <label class="block text-[7px] tracking-[2px] mb-1.5" style="color:var(--label-color)">URL DE YOUTUBE</label>
          <input class="cyber-input" id="plUrl" placeholder="https://youtube.com/playlist?list=..." />
        </div>
        <button id="addBtn" class="add-btn w-full rounded-lg py-2.5 sm:py-2 text-[8px] tracking-[2px] font-bold cursor-pointer transition-all">
          + AÑADIR A LA VAULT
        </button>
      </div>

      <!-- Lista de playlists -->
      <div class="pl-scroll flex flex-col gap-2 overflow-y-auto pr-0.5" style="max-height:min(360px, 50vh)" id="plList"></div>
    </div>
  </div>

  <!-- YouTube IFrame API -->
  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="app.js"></script>
</body>
</html>
